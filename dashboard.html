<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8" />

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="../css/site.css" rel="stylesheet">

</head>

<body>

    <nav class="navbar navbar-dark bg-primary">

        <div class="container-fluid">

            <span class="navbar-brand">Employee Management System</span>

            <button class="btn btn-light" onclick="logout()">
                Logout
            </button>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row">

            <div class="col-md-3">

                <div class="card text-bg-primary">

                    <div class="card-body">

                        <h5>Total Employees</h5>

                        <h2 id="totalEmployees">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-bg-success">

                    <div class="card-body">

                        <h5>Total Departments</h5>

                        <h2 id="totalDepartments">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-bg-warning">

                    <div class="card-body">

                        <h5>Present Today</h5>

                        <h2 id="presentToday">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-bg-danger">

                    <div class="card-body">

                        <h5>Absent Today</h5>

                        <h2 id="absentToday">0</h2>

                    </div>

                </div>

            </div>

        </div>

        <div class="row mt-4">

            <div class="col-md-12">

                <div class="card">

                    <div class="card-body">

                        <h4>Total Salary</h4>

                        <h2 id="totalSalary">₹0</h2>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="../js/dashboard.js"></script>

</body>
</html>
